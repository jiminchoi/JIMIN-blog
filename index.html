<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*JIMIN Blog.*</title>
    <!-- Google Fonts: Gothic, Mincho, and Rounded Styles for Japanese -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Zen+Maru_Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- FontAwesome for fallback & brand icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React and Babel CDN for zero-config running -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase App & Firestore via ES Modules support in browser -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, updateDoc, increment, addDoc, orderBy, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, getFirestore, doc, setDoc, getDoc, getDocs, collection, query, updateDoc, increment, addDoc, orderBy, where, onSnapshot, getStorage, ref, uploadBytesResumable, getDownloadURL };
    </script>

    <style>
        /* CSS Fonts Configuration */
        .font-gothic {
            font-family: 'M PLUS 1p', sans-serif;
        }
        .font-mincho {
            font-family: 'Noto Serif JP', serif;
        }
        .font-rounded {
            font-family: 'Zen Maru Gothic', sans-serif;
        }

        /* Custom scrollbar styling to fit dark blue aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }

        /* Ambient glow for the main title */
        .glow-text {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6), 0 0 30px rgba(59, 130, 246, 0.4);
        }

        /* Glassmorphism utility card */
        .glass-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .sakura-glass {
            background: rgba(253, 244, 245, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 63, 94, 0.15);
        }

        .forest-glass {
            background: rgba(20, 35, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .white-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-gothic transition-colors duration-500">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Default Fallback Database to ensure immediate display if Firebase is not configured yet
        const DEFAULT_POSTS = [];

        // 앱에서 사용할 Firebase 프로젝트 설정 (하드코딩되어 화면에는 노출되지 않음)
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCZuTMTQG3zq0xZctPBP9QC3MvfG14ZE4o",
            authDomain: "blogjimin-20050.firebaseapp.com",
            projectId: "blogjimin-20050",
            storageBucket: "blogjimin-20050.firebasestorage.app",
            messagingSenderId: "810707923301",
            appId: "1:810707923301:web:c687e0c1c1586e5384718c"
        };

        function App() {
            // --- UI & Customization States ---
            const [currentTab, setCurrentTab] = useState("home"); // 'home' | 'write' | 'custom'
            const [theme, setTheme] = useState("deep-blue"); // 'deep-blue' | 'sakura' | 'forest' | 'classic'
            const [fontStyle, setFontStyle] = useState("font-gothic"); // 'font-gothic' | 'font-mincho' | 'font-rounded'
            
            // --- User Auth States ---
            const [user, setUser] = useState(null); // { id, nickname, isGuest }
            const [loginId, setLoginId] = useState("");
            const [loginPw, setLoginPw] = useState("");
            const [authError, setAuthError] = useState("");

            // --- Blog Post / Interaction States ---
            const [posts, setPosts] = useState(DEFAULT_POSTS);
            const [selectedPost, setSelectedPost] = useState(null);
            const [likedPosts, setLikedPosts] = useState([]); // Array of local liked post IDs
            const [comments, setComments] = useState({}); // { postId: [comments] }
            const [newComment, setNewComment] = useState("");

            // --- Write Tab States ---
            const [newPostTitle, setNewPostTitle] = useState("");
            const [newPostContent, setNewPostContent] = useState("");
            const [coverType, setCoverType] = useState("preset"); // 'preset' | 'upload'
            const [selectedPreset, setSelectedPreset] = useState("linear-gradient(135deg, #1e293b, #0f172a)");
            const [customImageUrl, setCustomImageUrl] = useState("");

            // --- Firebase Configuration System (자동 연결, 화면 입력 불필요) ---
            const [isFirebaseConnected, setIsFirebaseConnected] = useState(false);
            const [firebaseStatusMsg, setFirebaseStatusMsg] = useState("接続を試みています...");
            // 게시글을 DB에서 아직 불러오는 중인지 여부. 이 값이 true인 동안에는
            // "投稿がありません" 같은 empty 문구를 절대 보여주지 않는다.
            const [isPostsLoading, setIsPostsLoading] = useState(true);
            const dbRef = useRef(null);
            const authRef = useRef(null);
            const storageRef = useRef(null);
            const MAX_IMAGE_SIZE = 5 * 1024 * 1024; // 5MB
            const [selectedImageFile, setSelectedImageFile] = useState(null);
            const [imagePreviewUrl, setImagePreviewUrl] = useState("");
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploadingImage, setIsUploadingImage] = useState(false);

            // Custom Preset Colors for Article Covers
            const presetGradients = [
                { name: "Deep Space", value: "linear-gradient(135deg, #0f172a, #1e3a8a)" },
                { name: "Tokyo Neon", value: "linear-gradient(135deg, #1e1b4b, #4c1d95)" },
                { name: "Sakura Breeze", value: "linear-gradient(135deg, #fda4af, #f43f5e)" },
                { name: "Forest Calm", value: "linear-gradient(135deg, #064e3b, #0f766e)" },
                { name: "Sunset Horizon", value: "linear-gradient(135deg, #7c2d12, #b91c1c)" },
                { name: "Minimal Charcoal", value: "linear-gradient(135deg, #1f2937, #111827)" }
            ];

            // Modal Trigger for non-authenticated guests
            const [showGuestAlert, setShowGuestAlert] = useState(false);
            const [toastMessage, setToastMessage] = useState("");

            // --- Helper to show Custom elegant toasts (replaces alert) ---
            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(""), 4000);
            };

            // Load saved theme / font / user, and auto-connect to the built-in Firebase project
            useEffect(() => {
                const savedTheme = localStorage.getItem("jimin_theme");
                const savedFont = localStorage.getItem("jimin_font");
                const savedUser = localStorage.getItem("jimin_user");

                if (savedTheme) setTheme(savedTheme);
                if (savedFont) setFontStyle(savedFont);
                if (savedUser) setUser(JSON.parse(savedUser));

                // 화면에서 API 키를 입력받지 않고, 스크립트에 내장된 FIREBASE_CONFIG로 자동 연결한다.
                // Firebase SDK 모듈이 비동기로 로드되므로 준비될 때까지 대기 후 초기화.
                const interval = setInterval(() => {
                    if (window.FirebaseSDK) {
                        clearInterval(interval);
                        initFirebase(FIREBASE_CONFIG);
                    }
                }, 100);
                return () => clearInterval(interval);
            }, []);

            // --- Initialize Firebase Client using the built-in config ---
            const initFirebase = async (config) => {
                try {
                    if (!config || !config.apiKey || !config.projectId) {
                        throw new Error("Firebase設定が正しくありません。apiKey や projectId などの必須キーを確認してください。");
                    }

                    const sdk = window.FirebaseSDK;
                    if (!sdk) throw new Error("Firebase SDKを読み込み中です。数秒後にやり直してください。");

                    // Initialize custom app instance safely
                    const app = sdk.initializeApp(config, "JiminBlogApp_" + Date.now());
                    const auth = sdk.getAuth(app);
                    const db = sdk.getFirestore(app);

                    // Silence Anonymous Auth failures (in case auth option is disabled in Firebase console)
                    try {
                        await sdk.signInAnonymously(auth);
                    } catch (authErr) {
                        console.warn("Anonymous auth failed, attempting to read Firestore without authentication:", authErr);
                    }

                    // Pre-verification database call to explicitly identify misconfigured Rules / DB status
                    const testColRef = sdk.collection(db, 'artifacts', 'jimin-blog-app', 'public', 'data', 'posts');
                    const testQuery = sdk.query(testColRef, sdk.orderBy('createdAt', 'desc'));
                    
                    try {
                        await sdk.getDocs(testQuery);
                    } catch (dbErr) {
                        if (dbErr.code === "permission-denied" || dbErr.message.includes("permission-denied")) {
                            throw new Error("Firestoreセキュリティルールによりアクセスが拒否されました。Firebase ConsoleのRulesタブが「allow read, write: if true;」になっているか確認してください。");
                        } else if (dbErr.message.includes("database") || dbErr.code === "not-found") {
                            throw new Error("Firestore Databaseが作成されていません。Firebase Consoleのビル드メニューでデータベースを作成してください。");
                        } else {
                            throw dbErr;
                        }
                    }

                    dbRef.current = db;
                    authRef.current = auth;
                    storageRef.current = sdk.getStorage(app);
                    setIsFirebaseConnected(true);
                    setFirebaseStatusMsg("⚡ クラウドデータベース(Firestore)に正常接続されました！");

                    // Fetch Posts instantly from the configured database
                    // (isPostsLoading is turned off once the first snapshot actually arrives)
                    fetchPostsFromFirebase(db);
                } catch (err) {
                    console.error("Firebase Init Error Details:", err);
                    setIsFirebaseConnected(false);
                    // Display the explicit detailed error instead of a generic message
                    setFirebaseStatusMsg(`❌ 接続失敗: ${err.message || err}`);
                    // 연결 자체가 실패했으면 더 이상 기다릴 필요가 없으므로 로딩을 종료하고
                    // 데모 데이터로 폴백한다 (여기서만 "投稿がありません" 문구가 뜨게 됨).
                    setPosts(DEFAULT_POSTS);
                    setIsPostsLoading(false);
                }
            };

            // --- Fetch Posts ---
            const fetchPostsFromFirebase = async (dbInstance) => {
                const db = dbInstance || dbRef.current;
                if (!db) return;

                try {
                    const sdk = window.FirebaseSDK;
                    const appId = "jimin-blog-app"; // fixed identifier
                    const postsCol = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                    const postsQuery = sdk.query(postsCol, sdk.orderBy('createdAt', 'desc'));
                    
                    // Setup real-time listener to automatically show updates across different devices
                    sdk.onSnapshot(postsQuery, (snapshot) => {
                        const fetched = [];
                        snapshot.forEach((doc) => {
                            fetched.push({ id: doc.id, ...doc.data() });
                        });
                        setPosts(fetched.length > 0 ? fetched : DEFAULT_POSTS);
                        // 실제로 DBから最初の応答が届いた時点でのみローディングを解除する。
                        // これにより「最初の投稿を待ちわびています」は本当に0件の時だけ表示される。
                        setIsPostsLoading(false);
                    }, (error) => {
                        console.error("Firestore onSnapshot error:", error);
                        triggerToast("DB同期エラーが発生しました。");
                        setPosts(DEFAULT_POSTS);
                        setIsPostsLoading(false);
                    });
                } catch (e) {
                    console.error("Fetch posts failed: ", e);
                    setPosts(DEFAULT_POSTS);
                    setIsPostsLoading(false);
                }
            };

            // --- Password hashing (SHA-256, client-side) ---
            // Prevents storing plaintext passwords in Firestore. Note: for real production auth,
            // use Firebase Authentication's built-in email/password provider instead of this mock layer.
            const hashPassword = async (plainText) => {
                const data = new TextEncoder().encode(plainText);
                const hashBuffer = await crypto.subtle.digest("SHA-256", data);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
            };

            // --- Login via Firestore (registration removed; users are provisioned directly in DB) ---
            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError("");

                if (!loginId || !loginPw) {
                    setAuthError("IDとパスワードを入力してください。");
                    return;
                }

                let loggedInUser = null;

                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const userDocRef = sdk.doc(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'users', loginId.trim());
                        const userSnap = await sdk.getDoc(userDocRef);
                        const inputHash = await hashPassword(loginPw);

                        if (userSnap.exists() && userSnap.data().passwordHash === inputHash) {
                            loggedInUser = {
                                id: userSnap.data().id,
                                nickname: userSnap.data().nickname,
                                isGuest: false
                            };
                        } else {
                            setAuthError("IDまたはパスワードが一致しません。");
                            return;
                        }
                    } catch (err) {
                        setAuthError("ログイン処理中にエラーが発生しました。");
                        return;
                    }
                } else {
                    setAuthError("データベースに接続されていないためログインできません。");
                    return;
                }

                setUser(loggedInUser);
                localStorage.setItem("jimin_user", JSON.stringify(loggedInUser));
                triggerToast(`${loggedInUser.nickname}様、お帰りなさいませ。`);
            };

            const handleGuestEntrance = () => {
                const guestUser = { id: "guest_user", nickname: "ゲスト", isGuest: true };
                setUser(guestUser);
                localStorage.setItem("jimin_user", JSON.stringify(guestUser));
                triggerToast("ゲスト権限でログインしました。");
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem("jimin_user");
                triggerToast("ログアウトしました。");
            };

            // --- Cover Image File Selection (device upload) ---
            const handleImageFileChange = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith("image/")) {
                    triggerToast("画像ファイルのみアップロード可能です。");
                    e.target.value = "";
                    return;
                }
                if (file.size > MAX_IMAGE_SIZE) {
                    triggerToast("ファイルサイズは5MBまでです。");
                    e.target.value = "";
                    return;
                }

                try {
                    const resizedBlob = await resizeImage(file, 1280, 0.82);
                    setSelectedImageFile(resizedBlob);
                    if (imagePreviewUrl) URL.revokeObjectURL(imagePreviewUrl);
                    setImagePreviewUrl(URL.createObjectURL(resizedBlob));
                } catch (err) {
                    console.error(err);
                    // Resize failed for some reason (e.g. unusual format) — fall back to the original file
                    setSelectedImageFile(file);
                    if (imagePreviewUrl) URL.revokeObjectURL(imagePreviewUrl);
                    setImagePreviewUrl(URL.createObjectURL(file));
                }
            };

            // Resizes/compresses an image client-side before upload: scales the longest side down to
            // maxDimension and re-encodes as JPEG at the given quality. Keeps uploads small & fast.
            const resizeImage = (file, maxDimension, quality) => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    const objectUrl = URL.createObjectURL(file);

                    img.onload = () => {
                        URL.revokeObjectURL(objectUrl);
                        let { width, height } = img;

                        if (width > maxDimension || height > maxDimension) {
                            if (width >= height) {
                                height = Math.round((height * maxDimension) / width);
                                width = maxDimension;
                            } else {
                                width = Math.round((width * maxDimension) / height);
                                height = maxDimension;
                            }
                        }

                        const canvas = document.createElement("canvas");
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext("2d").drawImage(img, 0, 0, width, height);

                        canvas.toBlob(
                            (blob) => blob ? resolve(blob) : reject(new Error("Canvas toBlob failed")),
                            "image/jpeg",
                            quality
                        );
                    };
                    img.onerror = () => {
                        URL.revokeObjectURL(objectUrl);
                        reject(new Error("Image load failed"));
                    };
                    img.src = objectUrl;
                });
            };

            // Uploads the selected file to Firebase Storage and returns its public download URL.
            // Falls back to an inline base64 data URL when Storage isn't connected (local/demo mode).
            const uploadCoverImage = (fileOrBlob) => {
                return new Promise((resolve, reject) => {
                    if (storageRef.current) {
                        const sdk = window.FirebaseSDK;
                        const path = `covers/${Date.now()}_${Math.random().toString(36).slice(2, 8)}.jpg`;
                        const fileRef = sdk.ref(storageRef.current, path);
                        const task = sdk.uploadBytesResumable(fileRef, fileOrBlob);

                        setIsUploadingImage(true);
                        task.on("state_changed",
                            (snapshot) => {
                                setUploadProgress(Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100));
                            },
                            (err) => {
                                setIsUploadingImage(false);
                                reject(err);
                            },
                            async () => {
                                const url = await sdk.getDownloadURL(task.snapshot.ref);
                                setIsUploadingImage(false);
                                setUploadProgress(0);
                                resolve(url);
                            }
                        );
                    } else {
                        // No Firebase connection: read as base64 so it can still be shown this session
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(fileOrBlob);
                    }
                });
            };

            // --- Write and Publish Post ---
            const handlePublishPost = async (e) => {
                e.preventDefault();
                if (!user || user.isGuest) {
                    setShowGuestAlert(true);
                    return;
                }

                if (!newPostTitle.trim() || !newPostContent.trim()) {
                    triggerToast("タイトルと内容を入力してください。");
                    return;
                }
                if (coverType === 'upload' && !selectedImageFile) {
                    triggerToast("カバー画像を選択してください。");
                    return;
                }

                let uploadedImageUrl = "";
                if (coverType === 'upload' && selectedImageFile) {
                    try {
                        uploadedImageUrl = await uploadCoverImage(selectedImageFile);
                    } catch (err) {
                        console.error(err);
                        triggerToast("画像アップロードに失敗しました。");
                        return;
                    }
                }

                const postPayload = {
                    title: newPostTitle,
                    content: newPostContent,
                    author: user.nickname,
                    coverType: coverType,
                    coverPreset: coverType === 'preset' ? selectedPreset : "",
                    imageUrl: coverType === 'upload' ? uploadedImageUrl : "",
                    likes: 0,
                    createdAt: new Date().toISOString()
                };

                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const postsCol = sdk.collection(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'posts');
                        await sdk.addDoc(postsCol, postPayload);
                        triggerToast("ブログを投稿しました！");
                    } catch (err) {
                        console.error(err);
                        triggerToast("投稿エラーが発生しました。");
                    }
                } else {
                    // Direct local mock insertion
                    const localId = "local-post-" + Date.now();
                    const updatedPosts = [{ id: localId, ...postPayload }, ...posts];
                    setPosts(updatedPosts);
                    triggerToast("ローカル環境にブログを保存しました。");
                }

                // Reset forms and return to feed
                setNewPostTitle("");
                setNewPostContent("");
                setCustomImageUrl("");
                if (imagePreviewUrl) URL.revokeObjectURL(imagePreviewUrl);
                setSelectedImageFile(null);
                setImagePreviewUrl("");
                setCurrentTab("home");
            };

            // --- Likes Interaction ---
            const handleLikePost = async (postId, e) => {
                e.stopPropagation();
                if (likedPosts.includes(postId)) {
                    triggerToast("既にリアクション済みです！");
                    return;
                }

                setLikedPosts([...likedPosts, postId]);

                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const postDoc = sdk.doc(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'posts', postId);
                        await sdk.updateDoc(postDoc, {
                            likes: sdk.increment(1)
                        });
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    setPosts(posts.map(p => p.id === postId ? { ...p, likes: p.likes + 1 } : p));
                    if (selectedPost && selectedPost.id === postId) {
                        setSelectedPost({ ...selectedPost, likes: selectedPost.likes + 1 });
                    }
                }
            };

            // --- Fetch Comments dynamically ---
            const fetchComments = async (postId) => {
                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const commentsCol = sdk.collection(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'comments');
                        const commentsQuery = sdk.query(commentsCol, sdk.where('postId', '==', postId));
                        
                        sdk.onSnapshot(commentsQuery, (snapshot) => {
                            const postComments = [];
                            snapshot.forEach((doc) => {
                                postComments.push({ id: doc.id, ...doc.data() });
                            });
                            // Sort in client side to avoid complex index requirements
                            postComments.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                            setComments(prev => ({ ...prev, [postId]: postComments }));
                        });
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    // Fallback to local structure
                    if (!comments[postId]) {
                        setComments(prev => ({
                            ...prev,
                            [postId]: [
                                { id: "demo-c-1", author: "Sakura", content: "とても感動する記事ですね！🌸", createdAt: new Date().toISOString() }
                            ]
                        }));
                    }
                }
            };

            const handlePostClick = (post) => {
                setSelectedPost(post);
                fetchComments(post.id);
            };

            // --- Write and Post a Comment ---
            const handleAddComment = async (e) => {
                e.preventDefault();
                if (!user || user.isGuest) {
                    setShowGuestAlert(true);
                    return;
                }

                if (!newComment.trim()) return;

                const commentPayload = {
                    postId: selectedPost.id,
                    author: user.nickname,
                    content: newComment.trim(),
                    createdAt: new Date().toISOString()
                };

                                    </h2>
                                </div>

                                {/* Main Scrollable Body Section */}
                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    <div className="flex items-center justify-between border-b border-slate-700/20 pb-3">
                                        <span className="text-xs font-bold text-blue-400">✏️ {selectedPost.author}</span>
                                        <span className="text-[10px] opacity-50">
                                            {new Date(selectedPost.createdAt).toLocaleString('ja-JP')}
                                        </span>
                                    </div>
                                    
                                    <p className="text-sm leading-relaxed whitespace-pre-wrap opacity-90 font-medium">
                                        {selectedPost.content}
                                    </p>

                                    {/* Comments Section */}
                                    <div className="border-t border-slate-700/20 pt-4">
                                        <h4 className="text-xs font-bold uppercase tracking-wider mb-3 opacity-60">コメント</h4>
                                        
                                        <div className="space-y-3 max-h-48 overflow-y-auto mb-4 pr-1">
                                            {(!comments[selectedPost.id] || comments[selectedPost.id].length === 0) ? (
                                                <p className="text-[11px] opacity-40 italic text-center py-2">コメントがありません。最初の会話をはじめましょう。</p>
                                            ) : (
                                                comments[selectedPost.id].map(comment => (
                                                    <div key={comment.id} className="bg-slate-800/20 rounded-xl p-3 border border-slate-700/10">
                                                        <div className="flex justify-between items-center mb-1">
                                                            <span className="text-xs font-bold text-blue-400">{comment.author}</span>
                                                            <span className="text-[9px] opacity-40">{new Date(comment.createdAt).toLocaleDateString()}</span>
                                                        </div>
                                                        <p className="text-xs opacity-90">{comment.content}</p>
                                                    </div>
                                                ))
                                            )}
                                        </div>

                                        {/* Write Comment Form */}
                                        <form onSubmit={handleAddComment} className="flex gap-2">
                                            <input 
                                                type="text" 
                                                className={`flex-1 px-4 py-2 rounded-xl border text-xs focus:outline-none ${styles.input}`}
                                                placeholder="コメントを入力..."
                                                value={newComment}
                                                onChange={e => setNewComment(e.target.value)}
                                            />
                                            <button type="submit" className={`px-4 py-2 rounded-xl text-xs font-bold ${styles.accent}`}>
                                                投稿
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- GUEST ALERT MODAL DIALOG --- */}
                    {showGuestAlert && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="max-w-sm w-full bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl text-center space-y-4">
                                <div className="w-12 h-12 rounded-full bg-blue-950 text-blue-400 flex items-center justify-center mx-auto text-xl">
                                    <i className="fa-solid fa-circle-exclamation"></i>
                                </div>
                                <div>
                                    <h3 className="text-md font-bold">メンバー登録が必要です</h3>
                                    <p className="text-xs opacity-60 mt-1 leading-relaxed">
                                        ゲスト会員はタイムラインの閲覧のみ可能です。ブログ投稿およびコメント機能を使用するには、ログアウトして会員登録を行ってください。
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setShowGuestAlert(false)}
                                        className={`flex-1 py-2.5 rounded-lg text-xs font-bold ${styles.btnSecondary}`}
                                    >
                                        キャンセル
                                    </button>
                                    <button 
                                        onClick={() => {
                                            setShowGuestAlert(false);
                                            handleLogout();
                                        }}
                                        className={`flex-1 py-2.5 rounded-lg text-xs font-bold ${styles.accent}`}
                                    >
                                        ログインへ移動
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render standard SPA inside target DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
