<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*JIMIN Blog.*</title>
    <!-- Google Fonts: Gothic, Mincho, and Rounded Styles for Japanese -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Zen+Maru_Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- FontAwesome for fallback & brand icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React and Babel CDN for zero-config running -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase App & Firestore via ES Modules support in browser -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, updateDoc, increment, addDoc, orderBy, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, getFirestore, doc, setDoc, getDoc, getDocs, collection, query, updateDoc, increment, addDoc, orderBy, where, onSnapshot };
    </script>

    <style>
        /* CSS Fonts Configuration */
        .font-gothic {
            font-family: 'M PLUS 1p', sans-serif;
        }
        .font-mincho {
            font-family: 'Noto Serif JP', serif;
        }
        .font-rounded {
            font-family: 'Zen Maru Gothic', sans-serif;
        }

        /* Custom scrollbar styling to fit dark blue aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }

        /* Ambient glow for the main title */
        .glow-text {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6), 0 0 30px rgba(59, 130, 246, 0.4);
        }

        /* Glassmorphism utility card */
        .glass-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .sakura-glass {
            background: rgba(253, 244, 245, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(244, 63, 94, 0.15);
        }

        .forest-glass {
            background: rgba(20, 35, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .white-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-gothic transition-colors duration-500">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Default Fallback Database to ensure immediate display if Firebase is not configured yet
        const DEFAULT_POSTS = [
            {
                id: "demo-post-1",
                title: "新しい始まり、新しい風 🌸",
                content: "今日から新しい挑戦が始まります。期待と緊張が半分ずつですが、一歩一歩進んでいきたいと思います。応援よろしくお願いします！",
                author: "Jimin",
                coverType: "preset",
                coverPreset: "linear-gradient(135deg, #1e3a8a, #3b82f6)",
                likes: 12,
                createdAt: new Date().toISOString()
            },
            {
                id: "demo-post-2",
                title: "雨の日のカフェ巡り ☕",
                content: "東京の静かな路地裏で見つけた小さな喫茶店。雨의 소리를 들으며 마시는 따뜻한 블렌드 커피는 각별했습니다. 여러분도 좋은 하루 보내세요.",
                author: "管理者",
                coverType: "preset",
                coverPreset: "linear-gradient(135deg, #0f172a, #1e293b)",
                likes: 8,
                createdAt: new Date(Date.now() - 86400000).toISOString()
            }
        ];

        function App() {
            // --- UI & Customization States ---
            const [currentTab, setCurrentTab] = useState("home"); // 'home' | 'write' | 'custom'
            const [theme, setTheme] = useState("deep-blue"); // 'deep-blue' | 'sakura' | 'forest' | 'classic'
            const [fontStyle, setFontStyle] = useState("font-gothic"); // 'font-gothic' | 'font-mincho' | 'font-rounded'
            
            // --- User Auth States ---
            const [user, setUser] = useState(null); // { id, nickname, isGuest }
            const [loginId, setLoginId] = useState("");
            const [loginPw, setLoginPw] = useState("");
            const [regId, setRegId] = useState("");
            const [regPw, setRegPw] = useState("");
            const [regNickname, setRegNickname] = useState("");
            const [authError, setAuthError] = useState("");
            const [isRegistering, setIsRegistering] = useState(false);

            // --- Blog Post / Interaction States ---
            const [posts, setPosts] = useState(DEFAULT_POSTS);
            const [selectedPost, setSelectedPost] = useState(null);
            const [likedPosts, setLikedPosts] = useState([]); // Array of local liked post IDs
            const [comments, setComments] = useState({}); // { postId: [comments] }
            const [newComment, setNewComment] = useState("");

            // --- Write Tab States ---
            const [newPostTitle, setNewPostTitle] = useState("");
            const [newPostContent, setNewPostContent] = useState("");
            const [coverType, setCoverType] = useState("preset"); // 'preset' | 'url'
            const [selectedPreset, setSelectedPreset] = useState("linear-gradient(135deg, #1e293b, #0f172a)");
            const [customImageUrl, setCustomImageUrl] = useState("");

            // --- Firebase Configuration System ---
            const [firebaseConfigStr, setFirebaseConfigStr] = useState("");
            const [isFirebaseConnected, setIsFirebaseConnected] = useState(false);
            const [firebaseStatusMsg, setFirebaseStatusMsg] = useState("未接続 (デフォルトのデモDBで動作중)");
            const dbRef = useRef(null);
            const authRef = useRef(null);

            // Custom Preset Colors for Article Covers
            const presetGradients = [
                { name: "Deep Space", value: "linear-gradient(135deg, #0f172a, #1e3a8a)" },
                { name: "Tokyo Neon", value: "linear-gradient(135deg, #1e1b4b, #4c1d95)" },
                { name: "Sakura Breeze", value: "linear-gradient(135deg, #fda4af, #f43f5e)" },
                { name: "Forest Calm", value: "linear-gradient(135deg, #064e3b, #0f766e)" },
                { name: "Sunset Horizon", value: "linear-gradient(135deg, #7c2d12, #b91c1c)" },
                { name: "Minimal Charcoal", value: "linear-gradient(135deg, #1f2937, #111827)" }
            ];

            // Modal Trigger for non-authenticated guests
            const [showGuestAlert, setShowGuestAlert] = useState(false);
            const [toastMessage, setToastMessage] = useState("");

            // --- Helper to show Custom elegant toasts (replaces alert) ---
            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(""), 4000);
            };

            // Load custom theme, fonts, and custom Firebase credentials if stored in localStorage
            useEffect(() => {
                const savedTheme = localStorage.getItem("jimin_theme");
                const savedFont = localStorage.getItem("jimin_font");
                const savedFirebaseConfig = localStorage.getItem("jimin_firebase_config");
                const savedUser = localStorage.getItem("jimin_user");

                if (savedTheme) setTheme(savedTheme);
                if (savedFont) setFontStyle(savedFont);
                if (savedUser) setUser(JSON.parse(savedUser));
                
                if (savedFirebaseConfig) {
                    setFirebaseConfigStr(savedFirebaseConfig);
                    initFirebase(savedFirebaseConfig);
                }
            }, []);

            // --- Initialize Custom Firebase Client dynamically (Auto-correcting Parser) ---
            const initFirebase = async (configJson) => {
                try {
                    let clean = configJson.trim();
                    
                    // [방탄 교정 로직 1] JS 변수 할당문 (const firebaseConfig = ...) 전체 자동 제거
                    clean = clean.replace(/^(const|let|var|window\.)?\s*\w+\s*=\s*/, '');
                    if (clean.endsWith(';')) {
                        clean = clean.slice(0, -1);
                    }
                    
                    // [방탄 교정 로직 2] 큰따옴표 없는 키값(apiKey 등)에 전부 완벽하게 큰따옴표 보완 적용
                    clean = clean.replace(/([{,]\s*)([a-zA-Z0-9_]+)(\s* :|\s*:)/g, '$1"$2"$3');
                    
                    // [방탄 교정 로직 3] 끝부분에 지저분하게 꼬인 콤마(,) 흔적 자동 청소 및 규격 복구
                    clean = clean.replace(/,\s*([\]}])/g, '$1');

                    const config = JSON.parse(clean);
                    
                    const sdk = window.FirebaseSDK;
                    if (!sdk) throw new Error("Firebase SDK is not loaded completely.");

                    const app = sdk.initializeApp(config, "JiminBlogApp_" + Date.now());
                    const auth = sdk.getAuth(app);
                    const db = sdk.getFirestore(app);

                    // Perform silent Anonymous Sign-In to satisfy database rules safely
                    await sdk.signInAnonymously(auth);

                    dbRef.current = db;
                    authRef.current = auth;
                    setIsFirebaseConnected(true);
                    setFirebaseStatusMsg("⚡ クラウドデータベース(Firestore)に正常接続されました！");
                    localStorage.setItem("jimin_firebase_config", clean);

                    // Fetch Posts instantly from the configured database
                    fetchPostsFromFirebase(db);
                } catch (err) {
                    console.error("Firebase Init Error Details:", err);
                    setIsFirebaseConnected(false);
                    setFirebaseStatusMsg("❌ 接続失敗: 設定情報のフォーマットを再確認してください。");
                }
            };

            // Save Firebase Configuration manually
            const handleSaveFirebaseConfig = () => {
                if (!firebaseConfigStr) {
                    localStorage.removeItem("jimin_firebase_config");
                    setIsFirebaseConnected(false);
                    dbRef.current = null;
                    setPosts(DEFAULT_POSTS);
                    setFirebaseStatusMsg("未接続 (デフォルトのデモDBで動作中)");
                    triggerToast("設定が初期化されました。デモデータベースを適用します。");
                    return;
                }
                initFirebase(firebaseConfigStr);
            };

            // --- Fetch Posts ---
            const fetchPostsFromFirebase = async (dbInstance) => {
                const db = dbInstance || dbRef.current;
                if (!db) return;

                try {
                    const sdk = window.FirebaseSDK;
                    const appId = "jimin-blog-app"; // fixed identifier
                    const postsCol = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'posts');
                    const postsQuery = sdk.query(postsCol, sdk.orderBy('createdAt', 'desc'));
                    
                    // Setup real-time listener to automatically show updates across different devices
                    sdk.onSnapshot(postsQuery, (snapshot) => {
                        const fetched = [];
                        snapshot.forEach((doc) => {
                            fetched.push({ id: doc.id, ...doc.data() });
                        });
                        setPosts(fetched.length > 0 ? fetched : DEFAULT_POSTS);
                    }, (error) => {
                        console.error("Firestore onSnapshot error:", error);
                        triggerToast("DB同期エラーが発生しました。");
                    });
                } catch (e) {
                    console.error("Fetch posts failed: ", e);
                }
            };

            // --- Custom User Registration & Login via Firestore Mock Layer ---
            const handleRegister = async (e) => {
                e.preventDefault();
                setAuthError("");

                if (!regId || !regPw || !regNickname) {
                    setAuthError("全ての項目を入力してください。");
                    return;
                }

                const newUserObj = { id: regId.trim(), nickname: regNickname.trim(), isGuest: false };

                // If Firebase DB is connected, store user securely in standard path
                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const userDocRef = sdk.doc(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'users', regId.trim());
                        
                        // Check if User already exists
                        const checkSnap = await sdk.getDoc(userDocRef);
                        if (checkSnap.exists()) {
                            setAuthError("既に存在するIDです。");
                            return;
                        }

                        // Save new record
                        await sdk.setDoc(userDocRef, {
                            id: regId.trim(),
                            password: regPw, // Simply stored for lightweight mock authentication
                            nickname: regNickname.trim(),
                            createdAt: new Date().toISOString()
                        });

                    } catch (err) {
                        setAuthError("DB登録中にエラーが発生しました。");
                        return;
                    }
                } else {
                    // Local Storage fallback when DB is not yet connected
                    const localUsers = JSON.parse(localStorage.getItem("local_users") || "{}");
                    if (localUsers[regId]) {
                        setAuthError("既に存在するIDです。");
                        return;
                    }
                    localUsers[regId] = { password: regPw, nickname: regNickname };
                    localStorage.setItem("local_users", JSON.stringify(localUsers));
                }

                setUser(newUserObj);
                localStorage.setItem("jimin_user", JSON.stringify(newUserObj));
                triggerToast("メンバー会員登録が完了しました！");
                setIsRegistering(false);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthError("");

                if (!loginId || !loginPw) {
                    setAuthError("IDとパスワードを入力してください。");
                    return;
                }

                let loggedInUser = null;

                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const userDocRef = sdk.doc(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'users', loginId.trim());
                        const userSnap = await sdk.getDoc(userDocRef);

                        if (userSnap.exists() && userSnap.data().password === loginPw) {
                            loggedInUser = {
                                id: userSnap.data().id,
                                nickname: userSnap.data().nickname,
                                isGuest: false
                            };
                        } else {
                            setAuthError("IDまたはパスワードが一致しません。");
                            return;
                        }
                    } catch (err) {
                        setAuthError("ログイン処理中にエラーが発生しました。");
                        return;
                    }
                } else {
                    // Local Storage verification fallback
                    const localUsers = JSON.parse(localStorage.getItem("local_users") || "{}");
                    const matchedUser = localUsers[loginId];
                    if (matchedUser && matchedUser.password === loginPw) {
                        loggedInUser = { id: loginId, nickname: matchedUser.nickname, isGuest: false };
                    } else {
                        setAuthError("IDまたはパスワードが一致しません。");
                        return;
                    }
                }

                setUser(loggedInUser);
                localStorage.setItem("jimin_user", JSON.stringify(loggedInUser));
                triggerToast(`${loggedInUser.nickname}様、お帰りなさいませ。`);
            };

            const handleGuestEntrance = () => {
                const guestUser = { id: "guest_user", nickname: "ゲスト", isGuest: true };
                setUser(guestUser);
                localStorage.setItem("jimin_user", JSON.stringify(guestUser));
                triggerToast("ゲスト権限でログインしました。");
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem("jimin_user");
                triggerToast("ログアウトしました。");
            };

            // --- Write and Publish Post ---
            const handlePublishPost = async (e) => {
                e.preventDefault();
                if (!user || user.isGuest) {
                    setShowGuestAlert(true);
                    return;
                }

                if (!newPostTitle.trim() || !newPostContent.trim()) {
                    triggerToast("タイトルと内容を入力してください。");
                    return;
                }

                const postPayload = {
                    title: newPostTitle,
                    content: newPostContent,
                    author: user.nickname,
                    coverType: coverType,
                    coverPreset: coverType === 'preset' ? selectedPreset : "",
                    imageUrl: coverType === 'url' ? customImageUrl : "",
                    likes: 0,
                    createdAt: new Date().toISOString()
                };

                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const postsCol = sdk.collection(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'posts');
                        await sdk.addDoc(postsCol, postPayload);
                        triggerToast("ブログを投稿しました！");
                    } catch (err) {
                        console.error(err);
                        triggerToast("投稿エラーが発生しました。");
                    }
                } else {
                    // Direct local mock insertion
                    const localId = "local-post-" + Date.now();
                    const updatedPosts = [{ id: localId, ...postPayload }, ...posts];
                    setPosts(updatedPosts);
                    triggerToast("ローカル環境にブログを保存しました。");
                }

                // Reset forms and return to feed
                setNewPostTitle("");
                setNewPostContent("");
                setCustomImageUrl("");
                setCurrentTab("home");
            };

            // --- Likes Interaction ---
            const handleLikePost = async (postId, e) => {
                e.stopPropagation();
                if (likedPosts.includes(postId)) {
                    triggerToast("既にリアクション済みです！");
                    return;
                }

                setLikedPosts([...likedPosts, postId]);

                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const postDoc = sdk.doc(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'posts', postId);
                        await sdk.updateDoc(postDoc, {
                            likes: sdk.increment(1)
                        });
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    setPosts(posts.map(p => p.id === postId ? { ...p, likes: p.likes + 1 } : p));
                    if (selectedPost && selectedPost.id === postId) {
                        setSelectedPost({ ...selectedPost, likes: selectedPost.likes + 1 });
                    }
                }
            };

            // --- Fetch Comments dynamically ---
            const fetchComments = async (postId) => {
                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const commentsCol = sdk.collection(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'comments');
                        const commentsQuery = sdk.query(commentsCol, sdk.where('postId', '==', postId));
                        
                        sdk.onSnapshot(commentsQuery, (snapshot) => {
                            const postComments = [];
                            snapshot.forEach((doc) => {
                                postComments.push({ id: doc.id, ...doc.data() });
                            });
                            // Sort in client side to avoid complex index requirements
                            postComments.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                            setComments(prev => ({ ...prev, [postId]: postComments }));
                        });
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    // Fallback to local structure
                    if (!comments[postId]) {
                        setComments(prev => ({
                            ...prev,
                            [postId]: [
                                { id: "demo-c-1", author: "Sakura", content: "とても感動する記事ですね！🌸", createdAt: new Date().toISOString() }
                            ]
                        }));
                    }
                }
            };

            const handlePostClick = (post) => {
                setSelectedPost(post);
                fetchComments(post.id);
            };

            // --- Write and Post a Comment ---
            const handleAddComment = async (e) => {
                e.preventDefault();
                if (!user || user.isGuest) {
                    setShowGuestAlert(true);
                    return;
                }

                if (!newComment.trim()) return;

                const commentPayload = {
                    postId: selectedPost.id,
                    author: user.nickname,
                    content: newComment.trim(),
                    createdAt: new Date().toISOString()
                };

                if (dbRef.current) {
                    try {
                        const sdk = window.FirebaseSDK;
                        const commentsCol = sdk.collection(dbRef.current, 'artifacts', 'jimin-blog-app', 'public', 'data', 'comments');
                        await sdk.addDoc(commentsCol, commentPayload);
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    // Local Append
                    const localCommentId = "local-c-" + Date.now();
                    const existing = comments[selectedPost.id] || [];
                    setComments({
                        ...comments,
                        [selectedPost.id]: [...existing, { id: localCommentId, ...commentPayload }]
                    });
                }

                setNewComment("");
            };

            // Changing visual theme layouts
            const handleThemeChange = (newTheme) => {
                setTheme(newTheme);
                localStorage.setItem("jimin_theme", newTheme);
            };

            const handleFontChange = (newFont) => {
                setFontStyle(newFont);
                localStorage.setItem("jimin_font", newFont);
            };

            // --- Theme Styling Mappings ---
            const getThemeClasses = () => {
                switch (theme) {
                    case "sakura":
                        return {
                            bg: "bg-[#FDFAF6] text-rose-900",
                            card: "sakura-glass text-rose-950",
                            header: "bg-rose-100/80 border-rose-200/50 text-rose-900",
                            accent: "bg-rose-500 text-white hover:bg-rose-600",
                            textGlow: "text-rose-600 glow-text",
                            input: "bg-white border-rose-200 focus:ring-rose-400 text-rose-900",
                            navActive: "border-rose-500 text-rose-600",
                            navInactive: "text-rose-400 hover:text-rose-500 border-transparent",
                            btnSecondary: "bg-rose-200/60 text-rose-800 hover:bg-rose-300/60"
                        };
                    case "forest":
                        return {
                            bg: "bg-[#0b160b] text-[#e2f0d9]",
                            card: "forest-glass text-[#e2f0d9]",
                            header: "bg-[#142314]/90 border-emerald-900/40 text-emerald-100",
                            accent: "bg-emerald-600 text-white hover:bg-emerald-500",
                            textGlow: "text-emerald-400 glow-text",
                            input: "bg-[#0e1c0e] border-emerald-950 focus:ring-emerald-500 text-emerald-100",
                            navActive: "border-emerald-500 text-emerald-400",
                            navInactive: "text-emerald-700 hover:text-emerald-500 border-transparent",
                            btnSecondary: "bg-emerald-950/60 text-emerald-200 hover:bg-emerald-900/60"
                        };
                    case "classic":
                        return {
                            bg: "bg-gray-50 text-gray-900",
                            card: "white-glass text-gray-900",
                            header: "bg-white/90 border-gray-200 text-gray-800",
                            accent: "bg-gray-900 text-white hover:bg-gray-800",
                            textGlow: "text-gray-900 font-bold",
                            input: "bg-white border-gray-300 focus:ring-gray-500 text-gray-900",
                            navActive: "border-gray-900 text-gray-900",
                            navInactive: "text-gray-400 hover:text-gray-600 border-transparent",
                            btnSecondary: "bg-gray-200 text-gray-800 hover:bg-gray-300"
                        };
                    case "deep-blue":
                    default:
                        return {
                            bg: "bg-[#0B192C] text-slate-100",
                            card: "glass-card text-slate-100",
                            header: "bg-[#1E3E62]/90 border-blue-900/40 text-slate-100",
                            accent: "bg-blue-600 text-white hover:bg-blue-500",
                            textGlow: "text-blue-400 glow-text",

                                        <div className="space-y-3 max-h-48 overflow-y-auto mb-4 pr-1">
                                            {(!comments[selectedPost.id] || comments[selectedPost.id].length === 0) ? (
                                                <p className="text-[11px] opacity-40 italic text-center py-2">コメントがありません。最初の会話をはじめましょう。</p>
                                            ) : (
                                                comments[selectedPost.id].map(comment => (
                                                    <div key={comment.id} className="bg-slate-800/20 rounded-xl p-3 border border-slate-700/10">
                                                        <div className="flex justify-between items-center mb-1">
                                                            <span className="text-xs font-bold text-blue-400">{comment.author}</span>
                                                            <span className="text-[9px] opacity-40">{new Date(comment.createdAt).toLocaleDateString()}</span>
                                                        </div>
                                                        <p className="text-xs opacity-90">{comment.content}</p>
                                                    </div>
                                                ))
                                            )}
                                        </div>

                                        {/* Write Comment Form */}
                                        <form onSubmit={handleAddComment} className="flex gap-2">
                                            <input 
                                                type="text" 
                                                className={`flex-1 px-4 py-2 rounded-xl border text-xs focus:outline-none ${styles.input}`}
                                                placeholder="コメントを入力..."
                                                value={newComment}
                                                onChange={e => setNewComment(e.target.value)}
                                            />
                                            <button type="submit" className={`px-4 py-2 rounded-xl text-xs font-bold ${styles.accent}`}>
                                                投稿
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {/* --- GUEST ALERT MODAL DIALOG --- */}
                    {showGuestAlert && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="max-w-sm w-full bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl text-center space-y-4">
                                <div className="w-12 h-12 rounded-full bg-blue-950 text-blue-400 flex items-center justify-center mx-auto text-xl">
                                    <i className="fa-solid fa-circle-exclamation"></i>
                                </div>
                                <div>
                                    <h3 className="text-md font-bold">メンバー登録が必要です</h3>
                                    <p className="text-xs opacity-60 mt-1 leading-relaxed">
                                        ゲスト会員はタイムラインの閲覧のみ可能です。ブログ投稿およびコメント機能を使用するには、ログアウトして会員登録を行ってください。
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => setShowGuestAlert(false)}
                                        className={`flex-1 py-2.5 rounded-lg text-xs font-bold ${styles.btnSecondary}`}
                                    >
                                        キャンセル
                                    </button>
                                    <button 
                                        onClick={() => {
                                            setShowGuestAlert(false);
                                            handleLogout();
                                        }}
                                        className={`flex-1 py-2.5 rounded-lg text-xs font-bold ${styles.accent}`}
                                    >
                                        ログインへ移動
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render standard SPA inside target DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
